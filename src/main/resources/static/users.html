<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Base Repo · Usuarios</title><link rel="stylesheet" href="styles.css"></head><body><div class="app-shell"><aside class="sidebar"><a class="brand" href="index.html">BASE<span>REPO</span></a><nav><a href="index.html">▦ Recursos</a><a class="active" href="users.html">◉ Usuarios</a></nav><div class="sidebar-bottom"><span id="current-user"></span><button class="link-button" data-logout>Cerrar sesión</button></div></aside><main class="app-main"><header class="page-header"><div><p class="eyebrow">Administración</p><h1>Usuarios</h1><p class="lead">Gestiona cuentas, roles y acceso a la plataforma.</p></div><button class="primary" data-open-modal="user-modal">+ Nuevo usuario</button></header><section class="panel"><div id="users-list" class="table-list"></div></section></main></div><dialog id="user-modal" class="modal"><form id="user-form"><header><div><p class="eyebrow" id="user-modal-label">Nuevo usuario</p><h2 id="user-modal-title">Crear usuario</h2></div><button type="button" class="icon-button" data-close-modal>×</button></header><div class="modal-body"><input name="id" type="hidden"><label>Usuario<input name="username" required></label><label>Contraseña <small id="password-help">Mínimo 8 caracteres</small><input name="password" type="password"></label><div class="form-grid"><label>Rol<select name="role"><option value="USER">Usuario</option><option value="CURATOR">Curador</option><option value="ADMINISTRATOR">Administrador</option></select></label><label class="check-label"><input name="enabled" type="checkbox" checked> Cuenta activa</label></div></div><footer><p id="user-message" class="message"></p><button type="button" class="secondary" data-close-modal>Cancelar</button><button class="primary" type="submit">Guardar</button></footer></form></dialog><dialog id="delete-modal" class="modal confirm"><form method="dialog"><header><h2>Eliminar usuario</h2><button type="button" class="icon-button" data-close-modal>×</button></header><div class="modal-body"><p id="delete-text">Esta acción no se puede deshacer.</p></div><footer><button class="secondary" type="button" data-close-modal>Cancelar</button><button id="confirm-delete" class="danger" type="button">Eliminar</button></footer></form></dialog><script src="auth.js"></script><script src="users.js"></script></body></html>
