<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Base Repo · Crear cuenta</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="login.css"></head><body><main class="login-shell"><section class="card login-card"><p class="eyebrow">Base Repo</p><h1>Crear cuenta</h1><p class="lead">Las cuentas nuevas se registran con el rol Usuario.</p><form id="register-form"><label>Usuario<input name="username" autocomplete="username" required autofocus></label><label>Correo<input name="email" type="email" autocomplete="email" required></label><label>Contraseña<input name="password" type="password" autocomplete="new-password" minlength="8" required></label><label>Confirmar contraseña<input name="confirmation" type="password" autocomplete="new-password" minlength="8" required></label><button class="primary" type="submit">Crear cuenta</button></form><p id="register-message" class="message" aria-live="polite"></p><p class="hint">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p></section></main><script src="auth.js"></script><script src="register.js"></script></body></html>
