<!doctype html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Base Repo · Iniciar sesión</title><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="login.css" /></head>
<body><main class="login-shell"><section class="card login-card"><p class="eyebrow">Base Repo</p><h1>Iniciar sesión</h1><p class="lead">Accede al repositorio multiusuario.</p><form id="login-form"><label>Usuario<input name="username" autocomplete="username" required autofocus /></label><label>Contraseña<input name="password" type="password" autocomplete="current-password" required /></label><button class="primary" type="submit">Entrar</button></form><p id="login-message" class="message" aria-live="polite"></p><p class="hint">¿Aún no tienes cuenta? <a href="register.html">Crear cuenta</a></p></section></main><script src="auth.js"></script><script src="login.js"></script></body></html>
