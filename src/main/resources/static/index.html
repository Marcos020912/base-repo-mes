<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Base Repo · Catálogo</title><link rel="stylesheet" href="styles.css"></head><body><div class="app-shell"><aside class="sidebar"><a class="brand" href="index.html">BASE<span>REPO</span></a><nav><a class="active" href="index.html">▦ Catálogo</a><a href="my-datasets.html">▣ Mis datasets</a><a id="users-nav" href="users.html" hidden>◉ Usuarios</a></nav><div class="sidebar-bottom"><span id="current-user"></span><button class="link-button" data-logout>Cerrar sesión</button></div></aside><main class="app-main"><header class="page-header"><div><p class="eyebrow">Repositorio digital</p><h1>Catálogo</h1><p class="lead">Explora los datasets compartidos por la organización.</p></div></header><section class="toolbar panel"><input id="filter" type="search" placeholder="Buscar por título, tipo o identificador"><select id="page-size"><option value="20">20 resultados</option><option value="50">50 resultados</option></select><button id="refresh-list" class="secondary">Actualizar</button><span id="status-text" class="status"></span></section><section id="resource-list" class="resource-grid" aria-live="polite"></section></main></div>
<dialog id="create-modal" class="modal"><form id="create-form" method="dialog"><header><div><p class="eyebrow">Nuevo recurso</p><h2>Registrar contenido</h2></div><button type="button" class="icon-button" data-close-modal>×</button></header><div class="modal-body"><label>Título<input name="title" required></label><div class="form-grid"><label>Año<input name="year" value="2026" required></label><label>Tipo<select name="type"><option value="DATASET">Dataset tabular</option><option value="IMAGE">Imágenes</option><option value="TEXT">Texto y documentos</option><option value="AUDIOVISUAL">Video</option><option value="OTHER">Otro</option></select></label></div><label>Editorial<input name="publisher" value="Repositorio local" required></label><div class="form-grid"><label>Nombre del creador<input name="givenName"></label><label>Apellido<input name="familyName"></label></div><label>Descripción del proyecto <small>description.md o ZIP con description.md e imágenes</small><input name="description" type="file" accept=".md,.zip,text/markdown,application/zip" required></label><label>Archivos del recurso <small id="file-type-hint">CSV, XLS, XLSX, TSV, ODS, Parquet, JSON o XML</small><input id="create-files" name="files" type="file" multiple accept=".csv,.tsv,.tab,.xls,.xlsx,.ods,.parquet,.sav,.dta,.json,.xml"></label></div><footer><p id="create-message" class="message"></p><button type="button" class="secondary" data-close-modal>Cancelar</button><button class="primary" type="submit">Crear recurso</button></footer></form></dialog>
<script src="auth.js"></script><script src="app.js"></script></body></html>
