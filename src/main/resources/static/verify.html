<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Base Repo · Verificar correo</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="login.css"></head><body><main class="login-shell"><section class="card login-card"><p class="eyebrow">Verificación</p><h1>Verifica tu correo</h1><p class="lead">Introduzca el código de seis dígitos enviado a su correo.</p><form id="verify-form"><label>Correo<input name="email" type="email" required></label><label>Código<input name="code" inputmode="numeric" pattern="[0-9]{6}" required></label><button class="primary">Verificar correo</button></form><p id="verify-message" class="message"></p><button id="resend" class="secondary" type="button">Reenviar código</button><p class="hint"><a href="login.html">Volver al inicio de sesión</a></p></section></main><script src="auth.js"></script><script src="verify.js"></script></body></html>
